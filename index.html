<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>AC Drift Championship</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-red-500 italic">AC DRIFT LEAGUE</h1>
            <div id="auth-section">
                <button onclick="login()" class="bg-indigo-600 hover:bg-indigo-700 px-5 py-2 rounded-lg font-bold transition">Zaloguj przez Discord</button>
            </div>
        </div>
    </nav>

    <div class="bg-slate-900 border-b border-slate-800">
        <div class="max-w-6xl mx-auto px-4 flex gap-2 py-3">
            <button onclick="switchRound(1)" id="tab-round-1" class="px-5 py-2 rounded-lg font-black text-sm transition bg-red-600 text-white">RUNDA 1: YAS MARINA</button>
            <button onclick="switchRound(2)" id="tab-round-2" class="px-5 py-2 rounded-lg font-black text-sm transition bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white">RUNDA 2: EBISU MINAMI</button>
        </div>
    </div>

    <main class="max-w-6xl mx-auto mt-8 px-4 space-y-12 pb-20">
        <section class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl">
            <h2 id="reg-title" class="text-xl font-bold mb-4 text-red-500 uppercase tracking-tight">Zapisy na RUNDĘ 1</h2>
            <div id="registration-form" class="hidden space-y-4 max-w-md">
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-1">Samochód</label>
                    <input type="text" id="reg-car" placeholder="np. Nissan S15" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-1">Team (opcjonalnie)</label>
                    <input type="text" id="reg-team" placeholder="np. Polish Gruz Team" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white outline-none focus:border-red-500">
                </div>
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-1">Kod Kraju (np. PL, FR, DE)</label>
                    <input type="text" id="reg-country" placeholder="PL" maxlength="2" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white uppercase outline-none focus:border-red-500">
                </div>
                <button onclick="registerDriver()" class="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-2 rounded transition">Wyślij zgłoszenie</button>
            </div>
            <p id="reg-msg" class="text-slate-400 italic">Zaloguj się przez Discord, aby wysłać swoje zgłoszenie na zawody.</p>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-4">
                <h2 id="table-title" class="text-xl font-black text-slate-200 uppercase tracking-tight border-l-4 border-red-500 pl-2">Zaakceptowani Kierowcy (Runda 1)</h2>
                <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden shadow-lg">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-950 text-slate-400 text-xs font-bold uppercase border-b border-slate-800">
                                <th class="p-4">Kierowca</th>
                                <th class="p-4">Team</th>
                                <th class="p-4">Auto</th>
                            </tr>
                        </thead>
                        <tbody id="drivers-table-body" class="divide-y divide-slate-800 text-sm">
                            <tr><td colspan="3" class="p-4 text-center text-slate-500 italic">Ładowanie...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="space-y-4">
                <h2 class="text-xl font-black text-slate-200 uppercase tracking-tight border-l-4 border-amber-500 pl-2">TOP 5 Kwalifikacji</h2>
                <div class="bg-slate-900 border border-slate-800 rounded-xl p-4 space-y-2 shadow-lg" id="top5-container">
                    <div class="text-slate-500 italic text-sm text-center py-4">Brak wyników...</div>
                </div>
            </div>
        </div>

        <section class="space-y-4">
            <h2 class="text-xl font-black text-slate-200 uppercase tracking-tight border-l-4 border-blue-500 pl-2">Drabinka pucharowa TOP 32</h2>
            <div class="bg-slate-900 border border-slate-800 rounded-xl p-6 overflow-x-auto shadow-lg">
                <div class="flex gap-8 min-w-[1200px]" id="bracket-container"></div>
            </div>
        </section>
    </main>

    <script>
        const SUPABASE_URL = "https://pjnthnehyprgzvfhtqtx.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqbnRobmVoeXByZ3p2Zmh0cXR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDMwMjUsImV4cCI6MjA5ODkxOTAyNX0.EXmNJE8-6k1w5_39Vr909JXlipgPzU2s3WX54lE619o";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUser = null;
        let currentRound = 1;
        const roundNames = { 1: "RUNDĘ 1: YAS MARINA", 2: "RUNDĘ 2: EBISU MINAMI" };

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user;
                document.getElementById('registration-form').classList.remove('hidden');
                document.getElementById('reg-msg').classList.add('hidden');
                
                const username = user.user_metadata.custom_claims?.global_name || user.user_metadata.full_name || user.user_metadata.name;
                
                document.getElementById('auth-section').innerHTML = `
                    <div class="flex items-center gap-4">
                        <a href="admin.html" class="text-xs bg-amber-500/10 text-amber-400 border border-amber-500/20 px-2.5 py-1 rounded font-bold uppercase tracking-wider hover:bg-amber-500 hover:text-slate-950 transition">Panel Admina</a>
                        <span class="text-sm">Kierowca: <strong class="text-white">${username}</strong></span>
                        <button onclick="logout()" class="text-xs text-slate-400 hover:text-white transition">Wyloguj</button>
                    </div>
                `;
                checkUserStatus();
            }
            loadData();
        }

        function switchRound(roundId) {
            currentRound = roundId;
            // Aktualizacja wyglądu przycisków
            [1, 2].forEach(id => {
                const btn = document.getElementById(`tab-round-${id}`);
                if(id === roundId) {
                    btn.className = "px-5 py-2 rounded-lg font-black text-sm transition bg-red-600 text-white";
                } else {
                    btn.className = "px-5 py-2 rounded-lg font-black text-sm transition bg-slate-800 text-slate-400 hover:bg-slate-700 hover:text-white";
                }
            });

            document.getElementById('reg-title').innerText = `Zapisy na ${roundNames[currentRound]}`;
            document.getElementById('table-title').innerText = `Zaakceptowani Kierowcy (${roundNames[currentRound]})`;
            
            if (currentUser) checkUserStatus();
            loadData();
        }

        async function checkUserStatus() {
            // Sprawdzamy status zgłoszenia tylko dla AKTUALNIE wybranej rundy
            const { data } = await supabaseClient.from('drivers').select('status').eq('id', currentUser.id).eq('round_id', currentRound).single();
            
            const formContainer = document.getElementById('registration-form');
            if (data) {
                if (data.status === 'ODRZUCONY') {
                    formContainer.innerHTML = `
                        <div class="p-4 bg-slate-950 border border-slate-800 rounded-lg space-y-2">
                            <p class="text-sm text-slate-400">Status na tej rundzie:</p>
                            <p class="text-lg font-black text-red-500">ODRZUCONY</p>
                            <button onclick="resetRegistration()" class="bg-slate-800 text-xs px-3 py-1.5 rounded border border-slate-700">Zgłoś się ponownie</button>
                        </div>
                    `;
                } else {
                    let colorClass = data.status === 'ZAAKCEPTOWANY' ? "text-emerald-400" : "text-amber-400";
                    formContainer.innerHTML = `
                        <div class="p-4 bg-slate-950 border border-slate-800 rounded-lg">
                            <p class="text-sm text-slate-400">Twoje zgłoszenie na tę rundę:</p>
                            <p class="text-lg font-black uppercase ${colorClass} mt-1">${data.status}</p>
                        </div>
                    `;
                }
            } else {
                // Jeśli brak wpisu dla tej rundy, przywracamy czysty formularz
                formContainer.innerHTML = `
                    <div>
                        <label class="block text-xs uppercase text-slate-400 mb-1">Samochód</label>
                        <input type="text" id="reg-car" placeholder="np. Nissan S15" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white outline-none focus:border-red-500">
                    </div>
                    <div>
                        <label class="block text-xs uppercase text-slate-400 mb-1">Team (opcjonalnie)</label>
                        <input type="text" id="reg-team" placeholder="np. Polish Gruz Team" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white outline-none focus:border-red-500">
                    </div>
                    <div>
                        <label class="block text-xs uppercase text-slate-400 mb-1">Kod Kraju (np. PL)</label>
                        <input type="text" id="reg-country" placeholder="PL" maxlength="2" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white uppercase outline-none focus:border-red-500">
                    </div>
                    <button onclick="registerDriver()" class="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-2 rounded transition">Wyślij zgłoszenie</button>
                `;
            }
        }

        async function resetRegistration() {
            if (!confirm("Usunąć odrzucone zgłoszenie z tej rundy?")) return;
            await supabaseClient.from('drivers').delete().eq('id', currentUser.id).eq('round_id', currentRound);
            switchRound(currentRound);
        }

        async function registerDriver() {
            const car = document.getElementById('reg-car').value.trim();
            const team = document.getElementById('reg-team').value.trim() || 'BRAK TEAMU';
            const country = document.getElementById('reg-country').value.trim() || 'PL';
            const username = currentUser.user_metadata.custom_claims?.global_name || currentUser.user_metadata.full_name || currentUser.user_metadata.name;

            if(!car) return alert("Podaj model samochodu!");

            const { error } = await supabaseClient.from('drivers').insert({
                id: currentUser.id,
                round_id: currentRound,
                username: username,
                avatar: currentUser.user_metadata.avatar_url,
                car: car,
                team: team,
                country: country.toUpperCase(),
                status: 'OCZEKUJE'
            });

            if(error) alert("Błąd zapisu: " + error.message);
            else switchRound(currentRound);
        }

        async function loadData() {
            // Pobieramy dane przefiltrowane po AKTUALNEJ rundzie
            const { data } = await supabaseClient.from('drivers').select('*').eq('round_id', currentRound).order('best_score', { ascending: false });
            const roundDrivers = data || [];
            
            const accepted = roundDrivers.filter(d => d.status === 'ZAAKCEPTOWANY');
            
            // Tabela kierowców
            const tbody = document.getElementById('drivers-table-body');
            if(accepted.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="p-4 text-center text-slate-500 italic">Brak zatwierdzonych zgłoszeń na tę rundę.</td></tr>`;
            } else {
                tbody.innerHTML = accepted.map(d => `
                    <tr class="hover:bg-slate-900/40 transition">
                        <td class="p-4 font-bold flex items-center gap-3">
                            <img src="https://flagcdn.com/16x12/${d.country.toLowerCase()}.png" class="rounded-sm shadow-sm" onerror="this.src='https://flagcdn.com/16x12/un.png'">
                            ${d.username}
                        </td>
                        <td class="p-4 text-slate-400">${d.team}</td>
                        <td class="p-4 text-red-400 font-mono text-xs font-semibold">${d.car}</td>
                    </tr>
                `).join('');
            }

            // TOP 5 Kwalifikacji
            const qualified = accepted.filter(d => d.best_score > 0).slice(0, 5);
            const top5Container = document.getElementById('top5-container');
            if(qualified.length === 0) {
                top5Container.innerHTML = `<div class="text-slate-500 italic text-sm text-center py-4">Brak opublikowanych wyników.</div>`;
            } else {
                top5Container.innerHTML = qualified.map((d, index) => `
                    <div class="flex justify-between items-center bg-slate-950 p-3 rounded-lg border border-slate-800 shadow-inner">
                        <div class="flex items-center gap-3 truncate">
                            <span class="font-black text-amber-500 text-sm w-4">${index+1}</span>
                            <span class="font-bold truncate text-sm">${d.username}</span>
                        </div>
                        <span class="font-mono font-black text-sm text-amber-400 pl-2">${Number(d.best_score).toFixed(2)}</span>
                    </div>
                `).join('');
            }

            // Drabinka TOP 32
            generateBracket(accepted.filter(d => d.best_score > 0));
        }

        function generateBracket(qualifiedDrivers) {
            const container = document.getElementById('bracket-container');
            let html = `<div class="space-y-6"> <h3 class="text-xs uppercase font-black text-slate-500 mb-2 tracking-widest">Runda 1 (TOP 32)</h3>`;
            for(let i = 0; i < 16; i++) {
                const p1 = qualifiedDrivers[i] ? qualifiedDrivers[i].username : `Miejsce #${i+1}`;
                const p2 = qualifiedDrivers[31 - i] ? qualifiedDrivers[31 - i].username : `Miejsce #${32 - i}`;
                html += `
                    <div class="bg-slate-950 border border-slate-800 rounded-lg w-64 text-xs overflow-hidden shadow-md">
                        <div class="p-2.5 border-b border-slate-900 bg-red-950/10 font-bold truncate text-slate-200">1. ${p1}</div>
                        <div class="p-2.5 bg-blue-950/10 font-bold truncate text-slate-200">2. ${p2}</div>
                    </div>
                `;
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        checkUser();
        supabaseClient.channel('public:drivers').on('postgres_changes', { event: '*', schema: 'public', table: 'drivers' }, () => { loadData(); }).subscribe();
    </script>
</body>
</html>
