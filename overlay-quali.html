<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>OBS Live Overlay - Wszystko w Jednym</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .skew-block { transform: skewX(-15deg); }
        .unskew { transform: skewX(15deg); }
    </style>
</head>
<body class="bg-transparent w-[1920px] h-[1080px] relative text-white font-sans overflow-hidden antialiased select-none p-20">

    <div id="view-single" class="hidden absolute bottom-16 right-24 flex items-end gap-3 scale-110 origin-bottom-right">
        <div class="flex flex-col items-end">
            <div id="driver-team" class="bg-slate-900/95 text-[10px] font-black uppercase tracking-widest px-3 py-0.5 border-b border-red-500 rounded-t-sm mr-4 text-slate-300">CZEKANIE...</div>
            <div class="skew-block bg-slate-900/95 border-l-4 border-red-500 w-[420px] h-14 flex items-center px-5 shadow-2xl">
                <div class="unskew flex items-center gap-3 w-full justify-between">
                    <div class="flex items-center gap-3 truncate">
                        <img id="driver-flag" src="https://flagcdn.com/24x18/un.png" class="w-5 h-3.5 object-cover rounded-sm">
                        <span id="driver-name" class="font-black text-lg tracking-wide uppercase truncate max-w-[240px]">BRAK KIEROWCY</span>
                    </div>
                    <span id="driver-car" class="text-[11px] font-black text-red-500 bg-red-500/10 border border-red-500/20 px-2 py-0.5 rounded uppercase max-w-[130px] truncate">---</span>
                </div>
            </div>
        </div>
        <div class="skew-block bg-slate-900/95 border border-slate-800 w-20 h-14 flex flex-col items-center justify-center"><span class="unskew text-[9px] font-black text-slate-500 uppercase tracking-wider">R1</span><span id="score-r1" class="unskew font-mono font-black text-base text-slate-100">0.00</span></div>
        <div class="skew-block bg-slate-950/95 border border-slate-800 w-20 h-14 flex flex-col items-center justify-center"><span class="unskew text-[9px] font-black text-slate-500 uppercase tracking-wider">R2</span><span id="score-r2" class="unskew font-mono font-black text-base text-slate-400">0.00</span></div>
    </div>

    <div id="view-top5" class="hidden w-full h-full flex flex-col justify-center items-center">
        <div class="bg-slate-900/95 border-2 border-slate-800 rounded-2xl w-[800px] p-8 shadow-2xl space-y-6">
            <h2 class="text-center text-2xl font-black text-amber-400 tracking-wider uppercase border-b border-slate-800 pb-4">TOP 5 KWALIFIKACJI - LIVE</h2>
            <div id="top5-rows" class="space-y-3"></div>
        </div>
    </div>

    <div id="view-bracket" class="hidden w-full h-full flex flex-col justify-center items-center">
        <div class="bg-slate-900/95 border-2 border-slate-800 rounded-2xl w-[1600px] p-8 shadow-2xl space-y-6">
            <h2 class="text-center text-2xl font-black text-blue-400 tracking-wider uppercase border-b border-slate-800 pb-4">DRABINKA PUCHAROWA TOP 32</h2>
            <div id="bracket-grid" class="grid grid-cols-4 gap-4 overflow-y-auto max-h-[700px] p-2"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://pjnthnehyprgzvfhtqtx.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqbnRobmVoeXByZ3p2Zmh0cXR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDMwMjUsImV4cCI6MjA5ODkxOTAyNX0.EXmNJE8-6k1w5_39Vr909JXlipgPzU2s3WX54lE619o";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function initOverlay() {
            const { data } = await supabaseClient.from('stream_state').select('*').eq('id', 'current_quali').single();
            if (data && data.data) handleStreamState(data.data);
        }

        function handleStreamState(payload) {
            // Ukryj wszystkie sekcje na start
            document.getElementById('view-single').classList.add('hidden');
            document.getElementById('view-top5').classList.add('hidden');
            document.getElementById('view-bracket').classList.add('hidden');

            if (!payload.type || payload.type === 'single') {
                // RENDER HUD POJEDYNCZEGO KIEROWCY
                document.getElementById('view-single').classList.remove('hidden');
                document.getElementById('driver-name').innerText = payload.driver || '---';
                document.getElementById('driver-car').innerText = payload.car || '---';
                document.getElementById('driver-team').innerText = payload.team || 'BRAK TEAMU';
                document.getElementById('score-r1').innerText = payload.r1 || '0.00';
                document.getElementById('score-r2').innerText = payload.r2 || '0.00';
                document.getElementById('driver-flag').src = `https://flagcdn.com/24x18/${(payload.country || 'un').toLowerCase()}.png`;
            } 
            else if (payload.type === 'top5') {
                // RENDER PEŁNEGO TOP 5
                document.getElementById('view-top5').classList.remove('hidden');
                const rows = document.getElementById('top5-rows');
                rows.innerHTML = payload.list.map((d, index) => `
                    <div class="flex justify-between items-center bg-slate-950/80 p-4 rounded-xl border border-slate-800">
                        <div class="flex items-center gap-4">
                            <span class="font-black text-xl text-amber-500 w-8 text-center">#${index+1}</span>
                            <span class="font-black uppercase tracking-wide text-lg">${d.username}</span>
                            <span class="text-xs text-slate-400 font-mono bg-slate-900 px-2 py-0.5 rounded">${d.car}</span>
                        </div>
                        <span class="font-mono font-black text-xl text-amber-400">${Number(d.best_score).toFixed(2)} pts</span>
                    </div>
                `).join('');
            } 
            else if (payload.type === 'bracket') {
                // RENDER DRABINKI TOP 32 W OBS
                document.getElementById('view-bracket').classList.remove('hidden');
                const grid = document.getElementById('bracket-grid');
                grid.innerHTML = payload.pairs.map(b => {
                    const d1 = payload.drivers.find(d => d.id === b.p1_id);
                    const d2 = payload.drivers.find(d => d.id === b.p2_id);
                    
                    const w1 = b.winner_id === b.p1_id && b.p1_id ? "bg-emerald-500/20 text-emerald-400 font-black border-l-4 border-emerald-500" : "text-slate-300";
                    const w2 = b.winner_id === b.p2_id && b.p2_id ? "bg-emerald-500/20 text-emerald-400 font-black border-l-4 border-emerald-500" : "text-slate-300";

                    return `
                        <div class="bg-slate-950 border border-slate-800 rounded-xl overflow-hidden p-1 shadow-md">
                            <div class="text-[10px] text-slate-500 px-2 font-black uppercase mb-1">Para #${b.pair_id}</div>
                            <div class="p-2 truncate text-sm border-b border-slate-900 ${w1}">1. ${d1 ? d1.username : '---'}</div>
                            <div class="p-2 truncate text-sm ${w2}">2. ${d2 ? d2.username : '---'}</div>
                        </div>
                    `;
                }).join('');
            }
        }

        supabaseClient.channel('schema-changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'stream_state' }, payload => {
                if (payload.new && payload.new.id === 'current_quali') {
                    handleStreamState(payload.new.data);
                }
            }).subscribe();

        initOverlay();
    </script>
</body>
</html>
