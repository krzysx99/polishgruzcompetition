<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>HUD Kwalifikacji Live - OBS Overlay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .skew-block { transform: skewX(-15deg); }
        .unskew { transform: skewX(15deg); }
    </style>
</head>
<body class="bg-transparent w-[1920px] h-[1080px] relative text-white font-sans overflow-hidden antialiased select-none">

    <div class="absolute bottom-16 right-24 flex items-end gap-3 scale-110 origin-bottom-right">
        
        <div class="flex flex-col items-end">
            <div id="driver-team" class="bg-slate-900/95 text-[10px] font-black uppercase tracking-widest px-3 py-0.5 border-b border-red-500 rounded-t-sm mr-4 text-slate-300 shadow-lg">WYSZUKIWANIE...</div>
            
            <div class="skew-block bg-slate-900/95 border-l-4 border-red-500 w-[420px] h-14 flex items-center px-5 shadow-2xl">
                <div class="unskew flex items-center gap-3 w-full justify-between">
                    <div class="flex items-center gap-3 truncate">
                        <img id="driver-flag" src="https://flagcdn.com/24x18/un.png" class="w-5 h-3.5 object-cover rounded-sm border border-slate-700 shadow">
                        <span id="driver-name" class="font-black text-lg tracking-wide uppercase truncate max-w-[240px]">OCZEKIWANIE...</span>
                    </div>
                    <span id="driver-car" class="text-[11px] font-black text-red-500 bg-red-500/10 border border-red-500/20 px-2 py-0.5 rounded uppercase max-w-[130px] truncate font-mono">---</span>
                </div>
            </div>
        </div>

        <div class="skew-block bg-slate-900/95 border border-slate-800 w-20 h-14 flex flex-col items-center justify-center shadow-xl">
            <span class="unskew text-[9px] font-black text-slate-500 uppercase tracking-wider">R1</span>
            <span id="score-r1" class="unskew font-mono font-black text-base text-slate-100">0.00</span>
        </div>

        <div class="skew-block bg-slate-950/95 border border-slate-800 w-20 h-14 flex flex-col items-center justify-center shadow-xl">
            <span class="unskew text-[9px] font-black text-slate-500 uppercase tracking-wider">R2</span>
            <span id="score-r2" class="unskew font-mono font-black text-base text-slate-400">0.00</span>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://pjnthnehyprgzvfhtqtx.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqbnRobmVoeXByZ3p2Zmh0cXR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDMwMjUsImV4cCI6MjA5ODkxOTAyNX0.EXmNJE8-6k1w5_39Vr909JXlipgPzU2s3WX54lE619o";
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function initOverlay() {
            const { data } = await supabaseClient.from('stream_state').select('*').eq('id', 'current_quali').single();
            if (data && data.data) render(data.data);
        }

        function render(data) {
            document.getElementById('driver-name').innerText = data.driver || '---';
            document.getElementById('driver-car').innerText = data.car || '---';
            document.getElementById('driver-team').innerText = data.team || 'BRAK TEAMU';
            document.getElementById('score-r1').innerText = data.r1 || '0.00';
            document.getElementById('score-r2').innerText = data.r2 || '0.00';
            
            const countryCode = data.country ? data.country.toLowerCase() : 'un';
            document.getElementById('driver-flag').src = `https://flagcdn.com/24x18/${countryCode}.png`;
        }

        // Subskrypcja kanału realtime (naprawiona - nasłuchuje zdarzenia UPDATE dla id 'current_quali')
        supabaseClient.channel('public:stream_state')
            .on('postgres_changes', { event: 'UPDATE', filter: "id=eq.current_quali", schema: 'public', table: 'stream_state' }, payload => {
                if(payload.new && payload.new.data) {
                    render(payload.new.data);
                }
            })
            .subscribe();

        initOverlay();
    </script>
</body>
</html>
