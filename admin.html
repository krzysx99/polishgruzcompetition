<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Admina - AC Drift League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans p-6">
    <div class="max-w-4xl mx-auto bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-xl space-y-8">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <h1 class="text-2xl font-black text-amber-400 uppercase tracking-wide">Panel Zarządzania Streamem</h1>
            <a href="index.html" class="text-sm text-slate-400 hover:text-white transition">← Powrót do strony głównej</a>
        </div>

        <div class="space-y-4">
            <h2 class="text-lg font-bold text-slate-300">1. Aktualny przejazd kwalifikacyjny (Live na Streamie)</h2>
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-4">
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-1 font-bold">Kierowca</label>
                    <input type="text" id="quali-driver" value="JOHANNIS DIOP" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-1 font-bold">Samochód</label>
                    <input type="text" id="quali-car" value="NISSAN 180SX" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-1 font-bold">Wynik R1</label>
                    <input type="text" id="quali-r1" value="84.50" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-1 font-bold">Wynik R2</label>
                    <input type="text" id="quali-r2" value="--" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>
            <button onclick="updateQualiStream()" class="bg-amber-500 hover:bg-amber-600 text-slate-950 font-bold px-6 py-2.5 rounded text-sm uppercase tracking-wider transition shadow-lg shadow-amber-500/10">
                Wyślij na Stream (Kwalifikacje)
            </button>
        </div>

        <div class="space-y-4 border-t border-slate-800 pt-6">
            <h2 class="text-lg font-bold text-slate-300">2. Aktualna Para TOP 32 / TOP 16</h2>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl space-y-3">
                    <span class="text-xs font-black text-red-500 uppercase">Kierowca LEAD</span>
                    <input type="text" id="battle-lead-name" value="HUGO HEUZE" class="w-full bg-slate-900 border border-slate-800 rounded p-2 text-sm" placeholder="Nazwa gracza">
                    <input type="text" id="battle-lead-car" value="TOYOTA SUPRA" class="w-full bg-slate-900 border border-slate-800 rounded p-2 text-sm" placeholder="Auto">
                </div>
                <div class="bg-slate-950 border border-slate-800 p-4 rounded-xl space-y-3">
                    <span class="text-xs font-black text-blue-500 uppercase">Kierowca CHASE</span>
                    <input type="text" id="battle-chase-name" value="ANDRIS KLEINBERGS" class="w-full bg-slate-900 border border-slate-800 rounded p-2 text-sm" placeholder="Nazwa gracza">
                    <input type="text" id="battle-chase-car" value="BMW E36" class="w-full bg-slate-900 border border-slate-800 rounded p-2 text-sm" placeholder="Auto">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-1 font-bold">Faza zawodów</label>
                    <input type="text" id="battle-stage" value="TOP 48" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm">
                </div>
                <div>
                    <label class="block text-xs uppercase text-slate-400 mb-1 font-bold">Lokalizacja / Tor</label>
                    <input type="text" id="battle-track" value="YAS MARINA" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm">
                </div>
            </div>
            <button onclick="updateBattleStream()" class="bg-red-600 hover:bg-red-700 text-white font-bold px-6 py-2.5 rounded text-sm uppercase tracking-wider transition shadow-lg shadow-red-600/10">
                Wyślij na Stream (Pojedynek)
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://pjnthnehyprgzvfhtqtx.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqbnRobmVoeXByZ3p2Zmh0cXR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDMwMjUsImV4cCI6MjA5ODkxOTAyNX0.EXmNJE8-6k1w5_39Vr909JXlipgPzU2s3WX54lE619o";
        const supabase = @supabase/supabase-js.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Funkcje wysyłające dane do tabel Supabase z włączonym Realtime
        async function updateQualiStream() {
            const driver = document.getElementById('quali-driver').value;
            const car = document.getElementById('quali-car').value;
            const r1 = document.getElementById('quali-r1').value;
            const r2 = document.getElementById('quali-r2').value;

            // Zapisujemy stan do bazy danych Supabase (w tabeli o nazwie 'stream_state')
            const { error } = await supabase.from('stream_state').upsert({ 
                id: 'current_quali', 
                data: { driver, car, r1, r2 } 
            });
            if (!error) alert("Zaktualizowano nakładkę kwalifikacji w OBS!");
        }

        async function updateBattleStream() {
            const leadName = document.getElementById('battle-lead-name').value;
            const leadCar = document.getElementById('battle-lead-car').value;
            const chaseName = document.getElementById('battle-chase-name').value;
            const chaseCar = document.getElementById('battle-chase-car').value;
            const stage = document.getElementById('battle-stage').value;
            const track = document.getElementById('battle-track').value;

            const { error } = await supabase.from('stream_state').upsert({ 
                id: 'current_battle', 
                data: { leadName, leadCar, chaseName, chaseCar, stage, track } 
            });
            if (!error) alert("Zaktualizowano nakładkę pojedynku w OBS!");
        }
    </script>
</body>
</html>
