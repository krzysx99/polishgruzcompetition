<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Panel Organizatora - AC Drift League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans p-6 hidden" id="admin-body">

    <div class="max-w-5xl mx-auto space-y-8">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <div class="flex items-center gap-6">
                <h1 class="text-2xl font-black text-amber-400 uppercase tracking-tight">Panel Ligi</h1>
                <div class="flex items-center gap-2 bg-slate-900 px-3 py-1.5 rounded-lg border border-slate-800">
                    <label class="text-xs uppercase text-slate-400 font-bold">Zarządzaj Rundą:</label>
                    <select id="admin-round-select" onchange="loadAdminData()" class="bg-slate-950 border border-slate-800 text-xs font-bold text-white rounded p-1 outline-none">
                        <option value="1">RUNDA 1: YAS MARINA</option>
                        <option value="2">RUNDA 2: EBISU MINAMI</option>
                    </select>
                </div>
            </div>
            <a href="index.html" class="text-sm text-slate-400 hover:text-white transition">← Powrót</a>
        </div>

        <section class="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl">
            <h2 class="text-sm font-bold text-slate-300 mb-4 border-l-4 border-red-500 pl-2 uppercase">Weryfikacja zgłoszeń</h2>
            <div class="overflow-x-auto"><table class="w-full text-left text-sm"><thead><tr class="text-slate-400 border-b border-slate-800 text-xs font-bold"><th class="p-3">Kierowca</th><th class="p-3">Auto</th><th class="p-3">Zarządzaj</th></tr></thead><tbody id="req-table-body" class="divide-y divide-slate-800"></tbody></table></div>
        </section>

        <section class="bg-slate-900 border border-slate-800 rounded-xl p-6 space-y-4 shadow-xl">
            <h2 class="text-sm font-bold text-slate-300 border-l-4 border-amber-500 pl-2 uppercase">Ocenianie Kwalifikacji & OBS Live</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <div>
                    <select id="quali-select" class="w-full bg-slate-950 border border-slate-800 rounded p-2 text-sm text-white" onchange="fillQualiFields()"><option value="">Wybierz...</option></select>
                </div>
                <input type="number" id="score-r1" step="0.01" placeholder="Wynik R1" class="bg-slate-950 border border-slate-800 rounded p-2 text-sm text-white">
                <input type="number" id="score-r2" step="0.01" placeholder="Wynik R2" class="bg-slate-950 border border-slate-800 rounded p-2 text-sm text-white">
                <div class="flex gap-2">
                    <button onclick="saveScores()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-xs font-bold rounded">ZAPISZ</button>
                    <button onclick="sendToQualiStream()" class="w-full bg-amber-500 text-slate-950 text-xs font-black rounded uppercase">OBS LIVE</button>
                </div>
            </div>
            <button onclick="sendTop5ToStream()" class="bg-slate-800 border border-slate-700 text-xs px-4 py-2 rounded text-amber-400 font-bold hover:bg-slate-700 transition">Pokaż TOP 5 na ekranie w OBS</button>
        </section>

        <section class="bg-slate-900 border border-slate-800 rounded-xl p-6 space-y-4 shadow-xl">
            <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                <h2 class="text-sm font-bold text-slate-300 border-l-4 border-blue-500 pl-2 uppercase">Zarządzanie Drabinką Pary TOP 32</h2>
                <div class="flex gap-2">
                    <button onclick="generateBracketPairs()" class="bg-blue-600 hover:bg-blue-700 text-xs font-bold px-3 py-2 rounded transition">Generuj pary z Kwalifikacji</button>
                    <button onclick="sendBracketToStream()" class="bg-amber-500 text-slate-950 text-xs font-black px-3 py-2 rounded uppercase">Pokaż drabinkę w OBS</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 max-h-[400px] overflow-y-auto pr-2" id="admin-bracket-list">
                </div>
        </section>
    </div>

    <script>
        const SUPABASE_URL = "https://pjnthnehyprgzvfhtqtx.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBqbnRobmVoeXByZ3p2Zmh0cXR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzNDMwMjUsImV4cCI6MjA5ODkxOTAyNX0.EXmNJE8-6k1w5_39Vr909JXlipgPzU2s3WX54lE619o";
        const supabaseApp = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const ADMIN_DISCORD_ID = "TUTAJ_WPISZ_SWOJE_ID"; 
        let allDriversList = [];

        async function verifyAdmin() {
            const { data: { user } } = await supabaseApp.auth.getUser();
            if (!user) { window.location.href = "index.html"; return; }
            const loggedInId = String(user.user_metadata.provider_id || user.user_metadata.sub || "");
            if (loggedInId !== String(ADMIN_DISCORD_ID).trim()) {
                alert(`Brak uprawnień admina!\nTwoje ID: ${loggedInId}`);
                window.location.href = "index.html";
            } else {
                document.getElementById('admin-body').classList.remove('hidden');
                loadAdminData();
            }
        }

        async function loadAdminData() {
            const activeRound = parseInt(document.getElementById('admin-round-select').value);
            const { data: drivers } = await supabaseApp.from('drivers').select('*').eq('round_id', activeRound);
            allDriversList = drivers || [];

            // Zgłoszenia
            const pending = allDriversList.filter(d => d.status === 'OCZEKUJE');
            document.getElementById('req-table-body').innerHTML = pending.length === 0 ? `<tr><td colspan="3" class="p-3 text-slate-500 text-center italic">Brak wniosków.</td></tr>` : 
            pending.map(d => `
                <tr><td class="p-3 font-bold text-white">${d.username}</td><td class="p-3">${d.car}</td><td class="p-3 space-x-2">
                    <button onclick="updateStatus('${d.id}', 'ZAAKCEPTOWANY')" class="bg-emerald-600 text-xs px-2 py-1 rounded">Tak</button>
                    <button onclick="updateStatus('${d.id}', 'ODRZUCONY')" class="bg-red-600 text-xs px-2 py-1 rounded">Nie</button>
                </td></tr>
            `).join('');

            // Selektor quali
            const accepted = allDriversList.filter(d => d.status === 'ZAAKCEPTOWANY');
            document.getElementById('quali-select').innerHTML = '<option value="">Wybierz...</option>' + accepted.map(d => `<option value="${d.id}">${d.username}</option>`).join('');

            // Załaduj stan drabinki
            const { data: bracket } = await supabaseApp.from('bracket').select('*').eq('round_id', activeRound).order('pair_id', { ascending: true });
            renderAdminBracket(bracket || []);
        }

        async function updateStatus(id, newStatus) {
            const activeRound = parseInt(document.getElementById('admin-round-select').value);
            await supabaseApp.from('drivers').update({ status: newStatus }).eq('id', id).eq('round_id', activeRound);
            loadAdminData();
        }

        function fillQualiFields() {
            const id = document.getElementById('quali-select').value;
            const driver = allDriversList.find(d => d.id === id);
            if(driver) {
                document.getElementById('score-r1').value = driver.score_r1;
                document.getElementById('score-r2').value = driver.score_r2;
            }
        }

        async function saveScores() {
            const id = document.getElementById('quali-select').value;
            if(!id) return alert("Wybierz kierowcę!");
            const activeRound = parseInt(document.getElementById('admin-round-select').value);
            const r1 = parseFloat(document.getElementById('score-r1').value) || 0;
            const r2 = parseFloat(document.getElementById('score-r2').value) || 0;
            await supabaseApp.from('drivers').update({ score_r1: r1, score_r2: r2, best_score: Math.max(r1, r2) }).eq('id', id).eq('round_id', activeRound);
            alert("Zapisano!"); loadAdminData();
        }

        async function generateBracketPairs() {
            if(!confirm("Czy chcesz wygenerować pary TOP 32 na podstawie wyników kwalifikacji? To nadpisze obecną drabinkę.")) return;
            const activeRound = parseInt(document.getElementById('admin-round-select').value);
            const qualified = allDriversList.filter(d => d.status === 'ZAAKCEPTOWANY' && d.best_score > 0).sort((a,b) => b.best_score - a.best_score);
            
            for(let i = 1; i <= 16; i++) {
                const p1 = qualified[i - 1] ? qualified[i - 1].id : null;
                const p2 = qualified[32 - i] ? qualified[32 - i].id : null;
                await supabaseApp.from('bracket').upsert({ round_id: activeRound, pair_id: i, p1_id: p1, p2_id: p2, winner_id: null });
            }
            alert("Drabinka wygenerowana pomyślnie!"); loadAdminData();
        }

        function renderAdminBracket(bracket) {
            const container = document.getElementById('admin-bracket-list');
            if(bracket.length === 0) { container.innerHTML = `<p class="text-xs text-slate-500 italic">Drabinka pusta. Wygeneruj ją przyciskiem u góry.</p>`; return; }
            
            container.innerHTML = bracket.map(b => {
                const d1 = allDriversList.find(d => d.id === b.p1_id);
                const d2 = allDriversList.find(d => d.id === b.p2_id);
                return `
                    <div class="bg-slate-950 p-3 rounded-lg border border-slate-800 text-xs flex justify-between items-center">
                        <span class="font-bold text-blue-400">Para #${b.pair_id}:</span>
                        <div class="flex items-center gap-2">
                            <select onchange="setWinner(${b.pair_id}, this.value)" class="bg-slate-900 border border-slate-800 rounded p-1 text-white">
                                <option value="">Brak zwycięzcy</option>
                                <option value="${b.p1_id || ''}" ${b.winner_id === b.p1_id && b.p1_id ? 'selected' : ''}>1. ${d1 ? d1.username : 'Pusty'}</option>
                                <option value="${b.p2_id || ''}" ${b.winner_id === b.p2_id && b.p2_id ? 'selected' : ''}>2. ${d2 ? d2.username : 'Pusty'}</option>
                            </select>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function setWinner(pairId, winnerId) {
            const activeRound = parseInt(document.getElementById('admin-round-select').value);
            await supabaseApp.from('bracket').update({ winner_id: winnerId || null }).eq('round_id', activeRound).eq('pair_id', pairId);
        }

        async function sendToQualiStream() {
            const id = document.getElementById('quali-select').value;
            if(!id) return alert("Wybierz kierowcę!");
            const driver = allDriversList.find(d => d.id === id);
            await supabaseApp.from('stream_state').upsert({
                id: 'current_quali', data: { type: 'single', driver: driver.username, car: driver.car, team: driver.team, country: driver.country, r1: (parseFloat(document.getElementById('score-r1').value)||0).toFixed(2), r2: (parseFloat(document.getElementById('score-r2').value)||0).toFixed(2) }
            });
        }

        async function sendTop5ToStream() {
            const activeRound = parseInt(document.getElementById('admin-round-select').value);
            const top5 = allDriversList.filter(d => d.status === 'ZAAKCEPTOWANY' && d.best_score > 0).sort((a,b) => b.best_score - a.best_score).slice(0, 5);
            await supabaseApp.from('stream_state').upsert({ id: 'current_quali', data: { type: 'top5', round: activeRound, list: top5 } });
            alert("Wysłano TOP 5 na ekran!");
        }

        async function sendBracketToStream() {
            const activeRound = parseInt(document.getElementById('admin-round-select').value);
            const { data: bracket } = await supabaseApp.from('bracket').select('*').eq('round_id', activeRound).order('pair_id', { ascending: true });
            await supabaseApp.from('stream_state').upsert({ id: 'current_quali', data: { type: 'bracket', round: activeRound, pairs: bracket, drivers: allDriversList } });
            alert("Wysłano Drabinkę na ekran!");
        }

        verifyAdmin();
    </script>
</body>
</html>
